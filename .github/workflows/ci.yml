name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        
      # If tests are added in the future, uncomment this:
      # - name: Run Tests
      #   run: npm test

  docker-build-test:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t hiresight-backend ./Backend

      - name: Build Frontend Docker Image
        run: docker build -t hiresight-frontend ./Frontend --build-arg VITE_API_URL=http://localhost:5000/api
