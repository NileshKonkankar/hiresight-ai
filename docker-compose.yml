version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_URL=http://localhost
      # Add other essential backend environment variables here, e.g.:
      # - MONGODB_URI=your_mongodb_connection_string
      - XAI_API_KEY=your_xai_api_key
      - XAI_MODEL=grok-beta

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - backend
