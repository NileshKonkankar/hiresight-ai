<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a0533"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Eye outline (outer) -->
  <ellipse cx="32" cy="32" rx="18" ry="11" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <!-- Eye lens -->
  <circle cx="32" cy="32" r="7" fill="url(#accent)" opacity="0.9"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="3.5" fill="#0f0c29"/>
  <!-- AI circuit lines -->
  <line x1="14" y1="32" x2="8" y2="25" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="14" y1="32" x2="8" y2="39" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="32" x2="56" y2="25" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="32" x2="56" y2="39" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Circuit dots -->
  <circle cx="8" cy="25" r="2" fill="#a855f7"/>
  <circle cx="8" cy="39" r="2" fill="#3b82f6"/>
  <circle cx="56" cy="25" r="2" fill="#a855f7"/>
  <circle cx="56" cy="39" r="2" fill="#3b82f6"/>
  <!-- Shine -->
  <circle cx="29" cy="30" r="1.5" fill="white" opacity="0.5"/>
</svg>